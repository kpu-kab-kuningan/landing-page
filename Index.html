<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Layanan - KPU Kabupaten Kuningan</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Latar Belakang Gradasi Modern */
        body {
            background: linear-gradient(135deg, #091221 0%, #153243 50%, #284b63 100%);
            color: white;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }


        .bg-peta-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            
            /* --- UBAH DUA BARIS INI --- */
            width: 80vw;        /* Naik ke 85vw (artinya peta otomatis memakan 85% lebar layar device) */
            max-width: 1000px;  /* Batas maksimal diperbesar agar di monitor PC tidak kekecilan */
            /* -------------------------- */
            
            display: flex;
            justify-content: center;
            align-items: center;
            
            z-index: -1;          
            opacity: 0.12;         /* Tetap 5% agar samar dan tidak mengganggu teks */
            pointer-events: none; 
            filter: grayscale(100%) brightness(1.5); 
        }

        .bg-peta-container img {
            width: 100%;
            height: auto;
            object-fit: contain;

            /* DUA BARIS TAMBAHAN UNTUK EFEK MULUS */
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1); 
            will-change: transform; /* Memberi tahu browser agar merender animasi ini dengan lancar */
        }

        /* Navigasi Atas */
        .top-nav {
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Area Konten Utama */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        /* Identitas KPU (Tengah Atas) */
        .brand-section {
            text-align: center;
            margin-bottom: 50px;
        }

        /* PERUBAHAN: Animasi awal putar lalu disambung berdenyut */
        .brand-section img {
        /* --- UBAH BAGIAN INI --- */
            width: clamp(130px, 15vw, 200px);
            /* ----------------------- */
            
            margin-bottom: 30px;
            filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.3));
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.3s ease;
            animation: spinIntro 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards, 
                    pulseLogo 2.5s infinite ease-in-out 1s;
        }

        .brand-section img:hover {
            transform: scale(1.1);
            filter: drop-shadow(0 0 32px rgba(0, 210, 255, 0.5));
        }

        /* Animasi Baru: Logo Berputar Masuk */
        @keyframes spinIntro {
            0% { transform: rotate(-360deg) scale(0); opacity: 0; }
            100% { transform: rotate(0) scale(1); opacity: 1; }
        }

        /* Animasi Berdenyut Halus untuk Logo */
        @keyframes pulseLogo {
            0% { transform: scale(1); filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.3)); }
            50% { transform: scale(1.03); filter: drop-shadow(0 0 28px rgba(0, 210, 255, 0.4)); }
            100% { transform: scale(1); filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.3)); }
        }

        /* PERUBAHAN: CSS untuk efek teks muncul per huruf */
        .huruf-intro {
            opacity: 0;
            display: inline-block;
            transform: translateY(15px);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }
        
        .huruf-intro.muncul {
            opacity: 1;
            transform: translateY(0);
        }

        /* Desain Glassmorphism untuk Card Aplikasi */
        .glass-card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            width: 160px;
            height: 160px;
            padding: 20px;
            text-align: center;
            text-decoration: none;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1), 
                        background 0.3s ease, 
                        border-color 0.3s ease, 
                        box-shadow 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            
            opacity: 0;
            transform: translateY(40px) scale(0.9);
            visibility: hidden;
            pointer-events: none;
        }

        .glass-card:hover {
            transform: translateY(-12px) scale(1.03) !important;
            background: rgba(255, 255, 255, 0.14);
            color: white;
        }

        .glass-card i { font-size: 3rem; margin-bottom: 15px; transition: transform 0.3s ease; }
        .icon-absen { color: #87a8d0; }  
        .icon-imut { color: #00d2ff; }   
        .icon-kendal { color: #f9d423; } 
        .icon-peta { color: #00ff87; }   
        .icon-gas { color: #ff758c; }    

        .glass-card:hover.card-absen { border-color: #87a8d0; box-shadow: 0 15px 35px rgba(135, 168, 208, 0.3); }
        .glass-card:hover.card-imut { border-color: #00d2ff; box-shadow: 0 15px 35px rgba(0, 210, 255, 0.3); }
        .glass-card:hover.card-kendal { border-color: #f9d423; box-shadow: 0 15px 35px rgba(249, 212, 35, 0.3); }
        .glass-card:hover.card-peta { border-color: #00ff87; box-shadow: 0 15px 35px rgba(0, 255, 135, 0.3); }
        .glass-card:hover.card-gas { border-color: #ff758c; box-shadow: 0 15px 35px rgba(255, 117, 140, 0.3); }
        
        .glass-card:hover i { transform: scale(1.08); }

        #app-container {
            display: flex;
            max-height: 0;
            overflow: visible;
            transition: max-height 0.5s ease;
        }

        #app-container.muncul {
            max-height: 200px;
        }

        #app-container.muncul .glass-card {
            opacity: 1;
            transform: translateY(0) scale(1);
            visibility: visible;
            pointer-events: auto;
        }

        #app-container.muncul .glass-card:nth-child(1) { transition-delay: 0.05s; }
        #app-container.muncul .glass-card:nth-child(2) { transition-delay: 0.12s; }
        #app-container.muncul .glass-card:nth-child(3) { transition-delay: 0.19s; }
        #app-container.muncul .glass-card:nth-child(4) { transition-delay: 0.26s; }
        #app-container.muncul .glass-card:nth-child(5) { transition-delay: 0.33s; }
    </style>
</head>
<body>
    <div class="bg-peta-container">
        <img src="map-kuningan.svg" alt="Peta Kuningan Watermark">
    </div>

    <div class="main-content">
        
        <div class="brand-section">
            <img src="logo-kpu.svg" alt="Logo KPU Kuningan" id="tombol-logo" title="Klik untuk membuka aplikasi!">
            <h3 class="fw-bold mb-1" id="teks-judul">KPU KUNINGAN SPACE</h3>
        </div>

        <div class="flex-wrap justify-content-center gap-4" id="app-container">
            
            <a href="#" target="_blank" rel="noopener noreferrer" class="glass-card card-absen">
                <i class="fa-solid fa-fingerprint icon-absen"></i>
                <span class="fw-bold small">Presensi</span>
            </a>
            
            <a href="https://script.google.com/macros/s/AKfycbySfmkoc9Vcsm23qg7PxKhk9cWpUDTbTB101Q9xHrssK0clDzFK7BlW8zXtz4EdERiNTA/exec" target="_blank" rel="noopener noreferrer" class="glass-card card-imut">
                <i class="fa-solid fa-briefcase icon-imut"></i>
                <span class="fw-bold small">SI-IMUT</span>
            </a>

            <a href="https://kendal-in.vercel.app/" target="_blank" rel="noopener noreferrer" class="glass-card card-kendal">
                <i class="fa-solid fa-chart-line icon-kendal"></i>
                <span class="fw-bold small">Kendal.in</span>
            </a>

            <a href="https://script.google.com/macros/s/AKfycbzCJlAGXlqMhhy89zZw5pG_8L9f6z2QHBu2qbIEiyvuRm7XoU8T-UEDuDakIghlxaoX/exec" target="_blank" rel="noopener noreferrer" class="glass-card card-peta">
                <i class="fa-solid fa-map-location-dot icon-peta"></i>
                <span class="fw-bold small">SI-PETA</span>
            </a>

            <a href="https://script.google.com/macros/s/AKfycbycMZRMtG26EVHfOUpSH3CIU-rmpFNZmPtMbLB_h945WvP4WuNeOmyzeN3QZI84fOPQ/exec" target="_blank" rel="noopener noreferrer" class="glass-card card-gas">
                <i class="fa-solid fa-map icon-gas"></i>
                <span class="fw-bold small">SI-DAKUN</span>
            </a>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // Logika untuk menampilkan card aplikasi saat logo diklik
        const logoKpu = document.getElementById('tombol-logo');
        const containerAplikasi = document.getElementById('app-container');

        logoKpu.addEventListener('click', function() {
            containerAplikasi.classList.toggle('muncul');
            
            if(containerAplikasi.classList.contains('muncul')) {
                this.style.animation = 'none';
            } else {
                this.style.animation = 'pulseLogo 2.5s infinite ease-in-out';
            }
        });

        // PERUBAHAN: Logika untuk Animasi Intro Teks (KPU KUNINGAN SPACE)
        document.addEventListener('DOMContentLoaded', () => {
            const judulElement = document.getElementById('teks-judul');
            const teksAsli = judulElement.innerText;
            judulElement.innerHTML = ''; // Kosongkan dulu teks aslinya
            
            // Pecah teks jadi huruf-huruf tunggal dan masukkan ke dalam <span>
            teksAsli.split('').forEach(huruf => {
                const span = document.createElement('span');
                if (huruf === ' ') {
                    span.innerHTML = '&nbsp;'; // Jaga agar spasi tidak hilang
                } else {
                    span.innerText = huruf;
                }
                span.classList.add('huruf-intro');
                judulElement.appendChild(span);
            });

            // Ambil semua huruf yang baru dibuat
            const kumpulanHuruf = document.querySelectorAll('.huruf-intro');
            
            // Tunggu 1 detik (1000ms) sampai logo selesai berputar, lalu munculkan teks
            setTimeout(() => {
                kumpulanHuruf.forEach((span, index) => {
                    setTimeout(() => {
                        span.classList.add('muncul');
                    }, index * 80); // Jeda 80ms antar tiap huruf (kecepatan ngetik)
                });
            }, 1000);
        });

        // === EFEK PARALLAX BACKGROUND PETA TIPIS-TIPIS ===
        document.addEventListener('mousemove', function(e) {
            const petaKuningan = document.querySelector('.bg-peta-container img');
            
            if (petaKuningan) {
                // Rumus perhitungan posisi kursor dari tengah layar
                // Angka 90 adalah pembagi. SEMAKIN BESAR angkanya, SEMAKIN TIPIS gerakannya.
                const moveX = (window.innerWidth / 2 - e.pageX) / 90;
                const moveY = (window.innerHeight / 2 - e.pageY) / 90;
                
                // Menerapkan pergerakan ke gambar peta
                petaKuningan.style.transform = `translate(${moveX}px, ${moveY}px)`;
            }
        });
    </script>
</body>
</html>
